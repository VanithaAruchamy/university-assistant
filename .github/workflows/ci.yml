name: University Assistant CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        working-directory: 4hr-backend/backend
        run: npm install

      - name: Run ESLint
        working-directory: 4hr-backend/backend
        run: npm run lint || true

      - name: Run automated tests
        working-directory: 4hr-backend/backend
        env:
          JWT_SECRET: test_jwt_secret_for_ci_pipeline
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          NODE_ENV: test
        run: npm test -- --testPathPattern="tests/" --coverageReporters=text

      - name: Build check
        working-directory: 4hr-backend/backend
        run: npm run build

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        working-directory: 4hr-frontend/frontend
        run: npm install

      - name: Build React app
        working-directory: 4hr-frontend/frontend
        env:
          REACT_APP_API_URL: http://localhost:5000
          CI: false
        run: npm run build

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit backend dependencies
        working-directory: 4hr-backend/backend
        run: npm audit --audit-level=high || true
